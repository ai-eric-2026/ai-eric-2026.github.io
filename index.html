<!-- 3. Python 数字媒体实验室 (采用极致兼容模式) -->
<section class="mb-5">
    <h2 class="mb-3 border-bottom pb-2">数字媒体实验室 <span class="text-secondary" style="font-weight: 300;">Python Lab</span></h2>
    
    <!-- 替换为 cdnjs 源，避免 pyscript.net 的连接问题 -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com" />
    <script type="module" src="https://cdnjs.cloudflare.com"></script>

    <div class="lab-container p-4 shadow-sm rounded" style="background: #fff; border: 1px solid rgba(255,126,95,0.2);">
        <div class="row align-items-center">
            <div class="col-md-6">
                <h5 class="font-weight-bold" style="color: #ff7e5f;">实时图像处理</h5>
                <p class="small text-muted">Python 解释器正在浏览器中加载... <span id="py-load-status" style="color:red;">⏳ 载入中</span></p>
                <input type="file" id="media-upload" class="form-control-file mb-3" style="border: 1px solid #ddd; padding: 5px; border-radius: 4px; width: 100%;">
            </div>
            <div class="col-md-6 text-center">
                <div id="media-preview" style="min-height: 200px; border: 2px dashed #eee; display: flex; align-items: center; justify-content: center; border-radius: 8px;">
                    <span class="text-muted small">等待图片上传</span>
                </div>
            </div>
        </div>
    </div>

    <!-- 关键配置：指定包 -->
    <py-config>
        packages = ["pillow"]
    </py-config>

    {% raw %}
    <script type="py">
        from pyscript import when
        from PIL import Image, ImageFilter
        import io, base64
        from js import document, Uint8Array

        # 只要代码运行到这里，说明 Python 环境已经 Ready
        document.getElementById("py-load-status").innerHTML = "✅ 已就绪"
        document.getElementById("py-load-status").style.color = "green"

        @when("change", "#media-upload")
        async def handle_upload(event):
            preview = document.getElementById("media-preview")
            preview.innerHTML = "处理中..."
            
            files = event.target.files
            if not files: return
            
            file = files.item(0)
            buf = await file.arrayBuffer()
            data = Uint8Array.new(buf).to_bytes()
            
            try:
                img = Image.open(io.BytesIO(data))
                # 简单滤镜算法
                processed = img.convert("L").filter(ImageFilter.FIND_EDGES)
                
                out = io.BytesIO()
                processed.save(out, format="PNG")
                b64 = base64.b64encode(out.getvalue()).decode()
                
                preview.innerHTML = f'<img src="data:image/png;base64,{b64}" style="max-width:100%; max-height:300px; border-radius:4px;">'
            except Exception as e:
                preview.innerHTML = f"错误: {str(e)}"
    </script>
    {% endraw %}
</section>
